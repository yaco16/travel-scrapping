<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Travel Scrapping</title>
  <script>
    try {
      document.documentElement.dataset.theme = localStorage.getItem("theme") || "light";
    } catch {
      document.documentElement.dataset.theme = "light";
    }
  </script>
  <script src="https://unpkg.com/htmx.org@2.0.4"></script>
  <link rel="stylesheet" href="/static/style.css">
  {% block head %}{% endblock %}
</head>
<body>
  <nav class="app-nav">
    <div class="app-nav__links">
      <a class="app-nav__link" href="/">Dashboard</a>
      <a class="app-nav__link" href="/results">Résultats</a>
      <a class="app-nav__link" href="/history">Historique</a>
    </div>
    <button type="button" class="app-nav__theme-toggle" data-theme-toggle aria-label="Changer le thème">Mode sombre</button>
  </nav>
  <main class="app-shell">{% block content %}{% endblock %}</main>
  <script>
    const themeToggle = document.querySelector("[data-theme-toggle]");
    const setTheme = (theme) => {
      document.documentElement.dataset.theme = theme;
      try {
        localStorage.setItem("theme", theme);
      } catch {}
      if (themeToggle) {
        themeToggle.textContent = theme === "dark" ? "Mode clair" : "Mode sombre";
      }
    };
    let storedTheme = "light";
    try {
      storedTheme = localStorage.getItem("theme") || "light";
    } catch {}
    setTheme(storedTheme);
    if (themeToggle) {
      themeToggle.addEventListener("click", () => {
        setTheme(document.documentElement.dataset.theme === "dark" ? "light" : "dark");
      });
    }
  </script>
</body>
</html>
